# Local development — use: mvn spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=dev
# or set SPRING_PROFILES_ACTIVE=dev in your IDE run configuration.
#
# No hardcoded DB user/password: avoids cloud deploys accidentally using a dev name (e.g. "Access denied for user 'Sajjad'").
# Set in your shell or IDE: MYSQLUSER, MYSQLPASSWORD (or SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD).
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
