# Activate with: SPRING_PROFILES_ACTIVE=prod (or --spring.profiles.active=prod)
# Override secrets via environment variables or a secure config store — do not commit real passwords.

server.forward-headers-strategy=framework

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Use validate or none after first deploy; override with env SPRING_JPA_HIBERNATE_DDL_AUTO if needed.
spring.jpa.hibernate.ddl-auto=validate

# Example: pass at runtime — app.cors.allowed-origins=https://jobs.yourdomain.com
