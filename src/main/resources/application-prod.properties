# Activate with: SPRING_PROFILES_ACTIVE=prod (or --spring.profiles.active=prod)
# Override secrets via environment variables or a secure config store — do not commit real passwords.

# Datasource: do not inherit dev defaults (Sajjad / password123) from application.properties.
# On Render, set SPRING_DATASOURCE_USERNAME and SPRING_DATASOURCE_PASSWORD to your cloud MySQL user.
# Railway-style MYSQLUSER / MYSQLPASSWORD still work if SPRING_* are unset.
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}

server.forward-headers-strategy=framework

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Empty MySQL + ddl-auto=validate fails startup (repositories then error on jpaSharedEM_entityManagerFactory).
# Default update for first Render deploy; harden later with env SPRING_JPA_HIBERNATE_DDL_AUTO=validate or none.
spring.jpa.hibernate.ddl-auto=update

# Example: pass at runtime — app.cors.allowed-origins=https://jobs.yourdomain.com
