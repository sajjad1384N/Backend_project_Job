spring.application.name=job-portal-backend

# Render, Fly.io, etc. inject PORT — must match what the process listens on.
server.port=${PORT:8080}

# Comma-separated frontend origins for CORS (add your production site: https://yourdomain.com)
app.cors.allowed-origins=http://localhost:4200,http://localhost:5173

# --- MySQL ---
# Local: defaults below. Railway: set MYSQL_URL (see docs/RAILWAY.md) or MYSQLHOST/MYSQLPORT/MYSQLUSER/MYSQLPASSWORD/MYSQLDATABASE.
# Optional override: SPRING_DATASOURCE_URL=jdbc:mysql://... (skips MYSQL_URL conversion).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:job_portal}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:Sajjad}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:password123}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# H2 console disabled when using MySQL
spring.h2.console.enabled=false

app.jwt.secret=YmFzZTY0RW5jb2RlZFNlY3JldEtleUZvckpvYlBvcnRhbEFwcDEyMzQ1Njc4OTAxMjM=
app.jwt.expiration-ms=86400000

app.resume.upload-dir=uploads/resumes
app.profile.upload-dir=uploads/profile-images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# --- Email (password reset, application notifications, status updates) ---
# Use jobportal.mail.enabled (NOT app.mail.enabled) — Spring maps env APP_MAIL_ENABLED to app.mail.* and was overriding this file.
# INBOX: jobportal.mail.enabled=true + real Gmail + App Password in spring.mail.password (or MAIL_PASSWORD env).
# Gmail: Google Account → Security → 2-Step Verification ON → App passwords → generate; use that 16-char value as password.
jobportal.mail.enabled=true
# Sender address (must match your SMTP account for Gmail).
jobportal.mail.from=${spring.mail.username}
# When SMTP is off: log reset link to terminal. When SMTP send fails: AuthService logs fallback link (dev).
jobportal.mail.log-reset-link-when-disabled=true
# Used in password-reset emails (link to Angular app).
app.frontend.base-url=http://localhost:4200

spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Prefer env vars so passwords are not committed: export MAIL_USERNAME MAIL_PASSWORD
# MUST be your real Gmail address (same as the account that owns the App Password).
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
# MUST be a 16-character App Password (Google Account → Security → 2-Step Verification → App passwords).
# Do not use your normal Gmail password. Paste without spaces or with spaces — both usually work.
spring.mail.password=${MAIL_PASSWORD:REPLACE_WITH_GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
# Uncomment for SMTP debugging: spring.mail.properties.mail.debug=true
